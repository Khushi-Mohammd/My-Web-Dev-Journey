<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="CSS/03-Simon-Says-Game.css">
  </head>
  <body>
    <h1>Simon Game</h1>
    <h2>Press any key to start the game</h2>

    <!-- Outer Box -->
    <div class="outerbox">

      <!-- Line One -->
      <div class="lineone">
        <div class="innerbox box1 red" type="button" id="box1">1</div>
        <div class="innerbox box2 yellow" type="button" id="box2">2</div>
      </div>

      <!-- Line Two -->
      <div class="linetwo">
        <div class="innerbox box3 green" type="button" id="box3">3</div>
        <div class="innerbox box4 purple" type="button" id="box4">4</div>
      </div>
      
    </div>
    <script src="JavaScript/03-Simon-Says-Game.js"></script>
  </body>
</html>
